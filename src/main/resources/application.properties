spring.application.name=SmartShop
## change the driver if you use a jdbc other than postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/smartshopdb?createDatabaseIfNotExist=true&amp;allowPublicKeyRetrieval=true&amp;useSSL=false&amp;useUnicode=true&amp;characterEncoding=UTF-8&amp;serverTimezone=UTC
spring.datasource.username=
spring.datasource.password=
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=none
spring.liquibase.change-log=classpath:/db/changelog/db.changelog-master.yaml
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.url=/api-docs

#active profile
spring.profiles.active=dev
#swagger ui
springdoc.swagger-ui.operations-sorter=method

#loging
logging.level.root = WARN
logging.file.name=app.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n

